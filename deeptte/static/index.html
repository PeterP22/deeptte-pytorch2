<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DeepTTE dispatch console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f0c; --panel: #15170f; --panel-2: #1b1e13;
    --ink: #ece9dd; --dim: #8f927e; --line: #2e321f;
    --acc: #ffc400; --ok: #7ed957; --bad: #ff5d45;
    --mono: "Space Mono", ui-monospace, monospace;
    --disp: "Archivo", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg) repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,.012) 3px 4px);
    color: var(--ink); font-family: var(--mono); font-size: 14px; line-height: 1.55;
    min-height: 100vh; padding: 28px 20px 60px;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }
  header {
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    border-bottom: 1px solid var(--line); padding-bottom: 14px; margin-bottom: 22px;
    animation: rise .5s ease both;
  }
  h1 { font-family: var(--disp); font-weight: 800; font-size: 26px; letter-spacing: -0.5px; }
  h1 .tte { color: var(--acc); }
  .sub { color: var(--dim); font-size: 12px; }
  #status { margin-left: auto; font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); display: inline-block; }
  .dot.on { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .dot.off { background: var(--bad); }

  .grid { display: grid; grid-template-columns: 5fr 7fr; gap: 18px; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: 2px;
    padding: 18px; position: relative; animation: rise .5s ease both;
  }
  .panel:nth-child(2) { animation-delay: .08s; }
  .panel::before {
    content: ""; position: absolute; inset: 6px; pointer-events: none;
    border: 1px dashed rgba(255,255,255,.05); border-radius: 1px;
  }
  .panel h2 {
    font-family: var(--disp); font-weight: 500; font-size: 12px; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--dim); margin-bottom: 14px;
  }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .presets button {
    font-family: var(--mono); font-size: 12px; padding: 7px 12px; cursor: pointer;
    background: var(--panel-2); color: var(--ink); border: 1px solid var(--line); border-radius: 2px;
    transition: border-color .15s, transform .1s;
  }
  .presets button:hover { border-color: var(--acc); transform: translateY(-1px); }
  .presets button.active { border-color: var(--acc); color: var(--acc); }
  label { display: block; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin: 12px 0 5px; }
  textarea, input {
    width: 100%; background: #0a0b08; color: var(--ink); border: 1px solid var(--line);
    border-radius: 2px; font-family: var(--mono); font-size: 12px; padding: 9px 10px;
  }
  textarea { height: 120px; resize: vertical; white-space: pre; }
  textarea:focus, input:focus { outline: none; border-color: var(--acc); }
  .row2 { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
  #send {
    width: 100%; margin-top: 18px; padding: 13px; cursor: pointer;
    font-family: var(--disp); font-weight: 800; font-size: 15px; letter-spacing: 2px; text-transform: uppercase;
    background: var(--acc); color: #14130a; border: none; border-radius: 2px;
    transition: transform .1s, box-shadow .15s;
  }
  #send:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(255,196,0,.25); }
  #send:disabled { opacity: .55; cursor: wait; transform: none; box-shadow: none; }

  .eta-box { text-align: center; padding: 10px 0 16px; border-bottom: 1px dashed var(--line); margin-bottom: 14px; }
  .eta-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
  #eta {
    font-family: var(--mono); font-weight: 700; font-size: 76px; line-height: 1.05;
    color: var(--acc); font-variant-numeric: tabular-nums;
  }
  #eta.idle { color: var(--line); }
  .eta-unit { font-size: 16px; color: var(--dim); }
  .facts { display: flex; justify-content: center; gap: 26px; margin-top: 8px; font-size: 12px; color: var(--dim); flex-wrap: wrap; }
  .facts b { color: var(--ink); font-weight: 700; }
  .facts .hit { color: var(--ok); }
  #route-wrap { display: flex; justify-content: center; padding: 6px 0 2px; }
  #route { width: 100%; max-width: 420px; height: auto; }

  .log-head { display: flex; align-items: baseline; justify-content: space-between; }
  #wire {
    background: #0a0b08; border: 1px solid var(--line); border-radius: 2px;
    padding: 10px 12px; margin-top: 8px; font-size: 11.5px; max-height: 220px; overflow: auto;
    white-space: pre-wrap; word-break: break-all; color: var(--dim);
  }
  #wire .out { color: var(--acc); }
  #wire .in-ok { color: var(--ok); }
  #wire .in-bad { color: var(--bad); }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes blink { 50% { opacity: 0; } }
  .cursor { animation: blink 1s steps(1) infinite; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>DEEP<span class="tte">TTE</span></h1>
    <span class="sub">dispatch console — travel-time estimation, Porto model</span>
    <span id="status"><span class="dot" id="statdot"></span><span id="stattext">connecting…</span></span>
  </header>

  <div class="grid">
    <section class="panel">
      <h2>Build request</h2>
      <div class="presets" id="presets"></div>
      <label for="points">Route points — [[lng, lat], …]</label>
      <textarea id="points" spellcheck="false"></textarea>
      <div class="row2">
        <div>
          <label for="dep">Departure</label>
          <input type="datetime-local" id="dep">
        </div>
        <div>
          <label for="drv">Driver id</label>
          <input type="number" id="drv" value="0" min="0">
        </div>
      </div>
      <button id="send">Predict ETA</button>
    </section>

    <section class="panel">
      <h2>Result</h2>
      <div class="eta-box">
        <div class="eta-label">Estimated travel time</div>
        <div id="eta" class="idle">--.-</div>
        <div class="eta-unit">minutes</div>
        <div class="facts" id="facts"></div>
      </div>
      <div id="route-wrap"><svg id="route" viewBox="0 0 420 240"></svg></div>
      <div class="log-head"><h2 style="margin:0">Wire log</h2><span class="sub" id="lat"></span></div>
      <div id="wire">console ready<span class="cursor">_</span></div>
    </section>
  </div>
</div>

<script src="/presets.js"></script>
<script>
  const $ = id => document.getElementById(id);
  let actual = null;

  const now = new Date(Date.now() - new Date().getTimezoneOffset() * 60000);
  $("dep").value = now.toISOString().slice(0, 16);

  window.PRESETS.forEach((p, i) => {
    const b = document.createElement("button");
    b.textContent = `${p.label} · ${p.dist_km} km`;
    b.onclick = () => {
      document.querySelectorAll(".presets button").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      $("points").value = JSON.stringify(p.points);
      $("drv").value = p.driver_id;
      actual = p.actual_s;
      drawRoute(p.points);
    };
    $("presets").appendChild(b);
    if (i === 1) b.click();
  });

  $("points").addEventListener("input", () => {
    actual = null;
    document.querySelectorAll(".presets button").forEach(x => x.classList.remove("active"));
    try { drawRoute(JSON.parse($("points").value)); } catch {}
  });

  function drawRoute(pts) {
    if (!Array.isArray(pts) || pts.length < 2) return;
    const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
    const [x0, x1, y0, y1] = [Math.min(...xs), Math.max(...xs), Math.min(...ys), Math.max(...ys)];
    const pad = 18, W = 420, H = 240;
    const sc = Math.min((W - 2 * pad) / (x1 - x0 || 1e-6), (H - 2 * pad) / (y1 - y0 || 1e-6));
    const ox = (W - (x1 - x0) * sc) / 2, oy = (H - (y1 - y0) * sc) / 2;
    const map = p => [ox + (p[0] - x0) * sc, H - (oy + (p[1] - y0) * sc)];
    const d = pts.map((p, i) => (i ? "L" : "M") + map(p).map(v => v.toFixed(1)).join(" ")).join("");
    const [ax, ay] = map(pts[0]), [bx, by] = map(pts[pts.length - 1]);
    $("route").innerHTML =
      `<path d="${d}" fill="none" stroke="#ffc400" stroke-width="2" stroke-linejoin="round" opacity=".9"/>` +
      `<circle cx="${ax}" cy="${ay}" r="5" fill="#0e0f0c" stroke="#7ed957" stroke-width="2"/>` +
      `<circle cx="${bx}" cy="${by}" r="5" fill="#0e0f0c" stroke="#ff5d45" stroke-width="2"/>` +
      `<text x="${ax + 9}" y="${ay + 4}" fill="#8f927e" font-size="10" font-family="Space Mono">origin</text>` +
      `<text x="${bx + 9}" y="${by + 4}" fill="#8f927e" font-size="10" font-family="Space Mono">dest</text>`;
  }

  function log(line, cls) {
    const w = $("wire");
    w.innerHTML = w.innerHTML.replace(/<span class="cursor">_<\/span>/, "");
    w.innerHTML += `\n<span class="${cls || ""}">${line}</span><span class="cursor">_</span>`;
    w.scrollTop = w.scrollHeight;
  }

  function countUp(target) {
    const el = $("eta"); el.classList.remove("idle");
    const t0 = performance.now(), dur = 600;
    (function tick(t) {
      const k = Math.min((t - t0) / dur, 1);
      el.textContent = (target * (1 - Math.pow(1 - k, 3))).toFixed(1);
      if (k < 1) requestAnimationFrame(tick);
    })(t0);
  }

  $("send").onclick = async () => {
    let pts;
    try { pts = JSON.parse($("points").value); }
    catch { return log("✗ route points are not valid JSON", "in-bad"); }
    const payload = { points: pts, departure_time: $("dep").value, driver_id: +$("drv").value || 0 };
    const body = JSON.stringify(payload);
    $("send").disabled = true;
    log(`→ POST /predict  (${pts.length} points, ${(body.length / 1024).toFixed(1)} KB)`, "out");
    const t0 = performance.now();
    try {
      const r = await fetch("/predict", { method: "POST", headers: { "Content-Type": "application/json" }, body });
      const ms = performance.now() - t0;
      const data = await r.json();
      if (!r.ok) {
        log(`← ${r.status} in ${ms.toFixed(0)} ms  ${JSON.stringify(data.detail)}`, "in-bad");
      } else {
        log(`← 200 OK in ${ms.toFixed(0)} ms  ${JSON.stringify(data)}`, "in-ok");
        $("lat").textContent = `round trip ${ms.toFixed(0)} ms`;
        countUp(data.eta_minutes);
        let facts = `<span><b>${data.eta_seconds}</b> s</span><span><b>${data.dist_km}</b> km</span>`;
        if (actual !== null) {
          const err = Math.abs(data.eta_seconds - actual) / actual * 100;
          facts += `<span>actual was <b>${(actual / 60).toFixed(1)} min</b> · <span class="hit">${err.toFixed(1)}% off</span></span>`;
        }
        $("facts").innerHTML = facts;
      }
    } catch (e) { log(`✗ network error: ${e.message}`, "in-bad"); }
    $("send").disabled = false;
  };

  fetch("/healthz").then(r => r.json()).then(h => {
    $("statdot").className = "dot on";
    $("stattext").textContent = `model online — ${h.dataset} / ${h.checkpoint.split("/").pop()}`;
  }).catch(() => {
    $("statdot").className = "dot off";
    $("stattext").textContent = "backend unreachable";
  });
</script>
</body>
</html>
